[build]
builder = "nixpacks"
buildCommand = "npm ci && npx prisma generate && npm run build"

[deploy]
releaseCommand = "node dist/migrate.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Per-service settings (set in Railway UI — not locked here so each service can differ):
#   Web service:    startCommand = "node dist/server.js"  healthcheckPath = "/health"
#   Worker service: startCommand = "node dist/worker.js"  healthcheckPath = (empty)
