# Web service (Fastify HTTP + webhook ingestion)
[build]
builder = "nixpacks"
buildCommand = "npm ci && npx prisma generate && npm run build"

[deploy]
releaseCommand = "node dist/migrate.js"
startCommand = "npm run start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Worker service — add a second Railway service pointing at the same repo,
# override startCommand to: node dist/worker.js
# No healthcheck needed; Railway monitors process exit codes.
