[build]
builder = "nixpacks"
buildCommand = "npm ci && npx prisma generate && npm run build"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Per-service settings (set in Railway UI — not locked here so each service can differ):
#   Web service:    startCommand = "sh -c 'node dist/migrate.js && node dist/server.js'"
#                   healthcheckPath = "/health"
#   Worker service: startCommand = "node dist/worker.js"
#                   healthcheckPath = (empty)
