name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nodematik
          POSTGRES_PASSWORD: nodematik
          POSTGRES_DB: nodematik_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://nodematik:nodematik@localhost:5432/nodematik_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret-64-chars-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      ADMIN_API_KEY: ci-admin-api-key-32-chars-xxxxxxxxxxxx
      NODE_ENV: test
      ENCRYPTION_KEYS: '{"0":"AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="}'
      ENCRYPTION_CURRENT_KID: "0"
      FIELD_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      WEBHOOK_VERIFY_TOKEN: ci-verify-token
      META_APP_SECRET: ci-meta-app-secret
      PHONE_HASH_SECRET: ci-phone-hash-secret-32-chars-xxxxxxxxxx

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Unit + integration tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Startup smoke test
        run: |
          node dist/server.js &
          SERVER_PID=$!
          sleep 4
          curl --fail --retry 3 --retry-delay 1 http://localhost:3000/health
          kill $SERVER_PID
