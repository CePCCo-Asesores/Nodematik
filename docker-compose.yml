services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chatbox
      POSTGRES_PASSWORD: chatbox
      POSTGRES_DB: chatbox
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbox"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: node dist/migrate.js
    restart: "no"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://chatbox:chatbox@db:5432/chatbox
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    command: node dist/server.js
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://chatbox:chatbox@db:5432/chatbox
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    command: node dist/worker.js
    env_file: .env
    environment:
      DATABASE_URL: postgresql://chatbox:chatbox@db:5432/chatbox
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
